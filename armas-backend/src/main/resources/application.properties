spring.application.name=armas_springboot-api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/obofed?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Simon@1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Server
server.port=8080
server.servlet.context-path=/

# RSA Keys
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem

# Token validity (in seconds?)
ktg.secure.token.validity=2800

# Disable SQL init (if you don't have schema/data scripts)
spring.sql.init.mode=never

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Mail Properties (replace with real values when needed)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# Logging — reduce verbose output for better performance
# Change to DEBUG when troubleshooting specific issues only
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.simon.armas_springboot_api=WARN

# HikariCP Connection Pool — reuse DB connections for faster response
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Update base URL for production
site.base.url.https=http://localhost:8080 

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.preferIpAddress=true

# Translation Service Feign Config
translation-service.url=http://localhost:8086

# Feign Client Timeouts (in ms) to prevent slow requests from blocking the UI
feign.client.config.default.connectTimeout=1000
feign.client.config.default.readTimeout=2000
