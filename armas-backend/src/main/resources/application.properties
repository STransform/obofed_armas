spring.application.name=armas_springboot-api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/mof_irms_db_5
spring.datasource.username=root
spring.datasource.password=Simon@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=Simon@1234
spring.datasource.username=root
spring.datasource.url=jdbc:mysql://localhost:3306/armas_db?serverTimezone=UTC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080
server.servlet.context-path=/

# RSA Keys
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem

# Token validity (in seconds?)
ktg.secure.token.validity=2800

# Disable SQL init (if you don't have schema/data scripts)
spring.sql.init.mode=never

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Mail Properties (replace with real values when needed)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Site URL
site.base.url.https=http://localhost:8080

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.simon.armas_springboot_api=DEBUG

# Update base URL for production
site.base.url.https=http://localhost:8080 

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.preferIpAddress=true

# Translation Service Feign Config
translation-service.url=http://localhost:8086